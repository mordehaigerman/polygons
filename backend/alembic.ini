[alembic]
script_location = alembic
prepend_sys_path = src
sqlalchemy.url = sqlite:///./data/polygons.db
# Stamp new revisions' Create Date in UTC so the file header is consistent
# across contributors' local timezones.
timezone = UTC
# Sequential numeric revision ids: pass `--rev-id NNNN` to each
# `alembic revision` to keep the `0001_*.py` style. The template just
# locks in how the filename is assembled from rev id + slug.
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# ruff_check --fix is intentionally NOT a hook here: it strips the template's
# `import sqlalchemy as sa` and `from alembic import op` as F401 (unused) when
# the body is still `pass`. Lint runs in the normal workflow (make lint, CI).
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
